<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>GRHS ART SPACE</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #29241f;
      --muted: #6f665d;
      --panel: rgba(255, 250, 241, .82);
      --line: rgba(71, 57, 43, .18);
      --accent: #52624f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f2;
      color: var(--ink);
    }

    #gallery {
      position: fixed;
      inset: 0;
      cursor: crosshair;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      background:
        radial-gradient(circle at 50% 8%, rgba(255, 255, 255, .86), transparent 38%),
        linear-gradient(180deg, #f9fbfc 0%, #edf1f1 100%);
    }

    .topbar,
    .caption,
    .progress {
      position: fixed;
      z-index: 4;
      pointer-events: none;
    }

    .topbar {
      top: clamp(16px, 3vw, 28px);
      left: clamp(16px, 3vw, 32px);
      right: clamp(16px, 3vw, 32px);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    h1,
    h2 {
      margin: 0;
      max-width: min(620px, 66vw);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 5.2vw, 5.4rem);
      font-weight: 500;
      line-height: .9;
      letter-spacing: 0;
      color: rgba(36, 31, 27, .92);
      text-wrap: balance;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .toolbar button {
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
    }

    .music-icon {
      display: block;
      width: 24px;
      height: 24px;
      color: #242121;
    }

    .music-icon.play {
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 24px solid currentColor;
      transform: translateX(2px);
    }

    .music-icon.pause {
      position: relative;
      width: 24px;
      height: 28px;
    }

    .music-icon.pause::before,
    .music-icon.pause::after {
      content: "";
      position: absolute;
      top: 0;
      width: 8px;
      height: 100%;
      background: currentColor;
    }

    .music-icon.pause::before {
      left: 2px;
    }

    .music-icon.pause::after {
      right: 2px;
    }

    .music-icon.stop {
      width: 24px;
      height: 24px;
      background: currentColor;
    }

    button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 241, .7);
      color: var(--ink);
      font-size: 1.2rem;
      line-height: 1;
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 28px rgba(62, 47, 33, .08);
      cursor: pointer;
    }

    button:hover {
      background: rgba(255, 255, 255, .92);
    }

    .caption {
      left: clamp(16px, 4vw, 48px);
      bottom: clamp(18px, 4vw, 42px);
      width: min(420px, calc(100vw - 32px));
      min-height: 98px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 22px 60px rgba(76, 59, 40, .16);
      backdrop-filter: blur(20px);
    }

    .caption b,
    .caption span {
      display: block;
    }

    .caption b {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.15rem, 2.2vw, 1.7rem);
      font-weight: 500;
      line-height: 1.06;
    }

    .caption span {
      margin-top: 8px;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.45;
    }

    .progress {
      right: clamp(16px, 3vw, 32px);
      bottom: clamp(76px, 8vw, 92px);
      width: min(220px, 34vw);
      height: 5px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(72, 58, 42, .16);
    }

    .progress i {
      display: block;
      width: 18%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transform-origin: left center;
    }

    .home-control {
      position: fixed;
      right: clamp(16px, 3vw, 32px);
      bottom: clamp(18px, 4vw, 42px);
      z-index: 4;
      display: grid;
      gap: 8px;
      pointer-events: auto;
    }

    .home-control button {
      width: auto;
      min-width: 138px;
      height: 42px;
      padding: 0 16px;
      font-size: .92rem;
      font-weight: 650;
      white-space: nowrap;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      box-shadow: inset 0 0 120px rgba(67, 49, 30, .12);
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f4f5f2;
      color: var(--muted);
      transition: opacity .5s ease, visibility .5s ease;
    }

    .loading.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .character-cursor {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 30;
      width: 58px;
      height: 58px;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-120px, -120px, 0);
      transition: opacity .18s ease;
      will-change: transform, opacity;
    }

    .character-cursor.is-visible {
      opacity: 1;
    }

    .character-cursor.is-hovering {
      width: 64px;
      height: 64px;
    }

    .character-cursor img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform-origin: 54% 68%;
      filter: drop-shadow(0 8px 12px rgba(54, 42, 30, .24));
      animation: cursor-flutter .72s ease-in-out infinite;
      will-change: transform;
    }

    .character-cursor::before,
    .character-cursor::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 999px;
      opacity: .8;
    }

    .character-cursor::before {
      width: 7px;
      height: 7px;
      left: 7px;
      top: 12px;
      background: #8fbf50;
      box-shadow: -7px 9px 0 #8fbf50, 8px -5px 0 #b2d56a;
      animation: cursor-spark .9s ease-in-out infinite;
    }

    .character-cursor::after {
      right: 5px;
      top: 17px;
      width: 12px;
      height: 18px;
      border: 3px solid rgba(116, 169, 58, .86);
      border-left: 0;
      transform-origin: left center;
      animation: cursor-wing .3s ease-in-out infinite alternate;
    }

    .character-cursor.is-active img {
      animation-duration: .34s;
    }

    @keyframes cursor-flutter {
      0%,
      100% {
        transform: translateY(0) rotate(-5deg) scale(1);
      }

      45% {
        transform: translateY(-5px) rotate(5deg) scale(1.035, .975);
      }

      70% {
        transform: translateY(-2px) rotate(-2deg) scale(.99, 1.025);
      }
    }

    @keyframes cursor-wing {
      from {
        transform: rotate(-18deg) scaleX(.72);
      }

      to {
        transform: rotate(16deg) scaleX(1.08);
      }
    }

    @keyframes cursor-spark {
      0%,
      100% {
        opacity: .35;
        transform: translateY(2px) scale(.85);
      }

      50% {
        opacity: .9;
        transform: translateY(-1px) scale(1);
      }
    }

    .welcome-modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(244, 245, 242, .72);
      backdrop-filter: blur(16px);
    }

    .welcome-modal.is-hidden {
      display: none;
    }

    .welcome-panel {
      width: min(560px, calc(100vw - 32px));
      padding: clamp(24px, 5vw, 42px);
      border: 1px solid rgba(41, 36, 31, .16);
      border-radius: 8px;
      background: rgba(255, 255, 252, .94);
      box-shadow: 0 26px 80px rgba(40, 35, 28, .18);
      text-align: center;
    }

    .welcome-panel p {
      margin: 0;
      font-size: clamp(1.08rem, 2.6vw, 1.45rem);
      line-height: 1.65;
      word-break: keep-all;
      color: var(--ink);
    }

    .welcome-panel button {
      width: auto;
      min-width: 92px;
      height: 42px;
      margin-top: 24px;
      padding: 0 18px;
      font-size: .95rem;
      font-family: inherit;
      touch-action: manipulation;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    .music-player {
      position: fixed;
      width: 1px;
      height: 1px;
      left: -10px;
      bottom: -10px;
      border: 0;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
      }

      h1,
      h2 {
        max-width: calc(100vw - 232px);
        font-size: clamp(1.35rem, 7vw, 2rem);
      }

      .toolbar {
        max-width: 192px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .caption {
        min-height: 86px;
        bottom: 76px;
      }

      .progress {
        display: none;
      }

      .home-control {
        right: 16px;
        bottom: 18px;
      }
    }

    @media (hover: hover) and (pointer: fine) {
      html,
      body,
      #gallery,
      button {
        cursor: none;
      }
    }

    @media (pointer: coarse), (max-width: 760px) {
      .character-cursor {
        width: 48px;
        height: 48px;
      }

      .character-cursor.is-hovering {
        width: 52px;
        height: 52px;
      }
    }
  </style>
</head>
<body>
  <main id="gallery" aria-label="3D 명화 갤러리"></main>
  <div class="character-cursor" id="characterCursor" aria-hidden="true">
    <img src="assets/cursor/gallery-character.png" alt="" />
  </div>
  <div class="topbar">
    <h2>GRHS ART SPACE</h2>
    <div class="toolbar">
      <button type="button" data-music="play" aria-label="배경음악 재생" title="배경음악 재생"><span class="music-icon play" aria-hidden="true"></span></button>
      <button type="button" data-music="pause" aria-label="배경음악 일시정지" title="배경음악 일시정지"><span class="music-icon pause" aria-hidden="true"></span></button>
      <button type="button" data-music="stop" aria-label="배경음악 중지" title="배경음악 중지"><span class="music-icon stop" aria-hidden="true"></span></button>
      <button id="resetView" type="button" aria-label="처음 위치로">↺</button>
    </div>
  </div>
  <aside class="caption" aria-live="polite">
    <b id="artTitle">전시장 입구</b>
    <span id="artMeta">밝은 베이지 톤의 가상 전시장에 명작 10점을 걸어두었습니다.</span>
  </aside>
  <div class="home-control">
    <button id="guideView" type="button">갤러리 가이드</button>
    <button id="homeView" type="button">원래 위치로 이동</button>
  </div>
  <div class="progress" aria-hidden="true"><i id="progressBar"></i></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="loading" id="loading">갤러리 조명 조정 중</div>
  <div class="welcome-modal" id="welcomeModal" role="dialog" aria-modal="true" aria-labelledby="welcomeText">
    <div class="welcome-panel">
      <p id="welcomeText">계룡고등학교 음악X미술 프로젝트<br>'인상, 표현, 미니멀리즘의 점·선·색 변주곡'을 위한<br>갤러리에 오신 것을 환영합니다.</p>
      <button id="welcomeClose" type="button">입장</button>
    </div>
  </div>
  <div class="welcome-modal is-hidden" id="guideModal" role="dialog" aria-modal="true" aria-labelledby="guideText">
    <div class="welcome-panel">
      <p id="guideText">커서를 통해 상하좌우로 이동이 가능하고, 피사체를 누르면 가까이에서 들여다 볼 수 있습니다.</p>
      <button id="guideClose" type="button">닫기</button>
    </div>
  </div>
  <audio id="musicPlayer" class="music-player" preload="none"></audio>

  <script src="./assets/vendor/three.global.js"></script>
  <script>
  (() => {
    const mount = document.querySelector("#gallery");
    const loading = document.querySelector("#loading");
    const characterCursor = document.querySelector("#characterCursor");
    const titleEl = document.querySelector("#artTitle");
    const metaEl = document.querySelector("#artMeta");
    const progressBar = document.querySelector("#progressBar");
    const resetView = document.querySelector("#resetView");
    const guideView = document.querySelector("#guideView");
    const homeView = document.querySelector("#homeView");
    const toolbar = document.querySelector(".toolbar");
    const musicPlayer = document.querySelector("#musicPlayer");
    const welcomeModal = document.querySelector("#welcomeModal");
    const welcomeClose = document.querySelector("#welcomeClose");
    const guideModal = document.querySelector("#guideModal");
    const guideClose = document.querySelector("#guideClose");
    const playlist = [
      "assets/audio/danseuses-de-delphes.mp3",
      "assets/audio/voiles.mp3",
      "assets/audio/le-vent-dans-la-plaine.mp3",
      "assets/audio/les-sons-et-les-parfums.mp3",
      "assets/audio/les-collines-danacapri.mp3"
    ];
    let trackIndex = 0;
    let shouldAutoPlay = true;

    function loadTrack(index) {
      const nextTrack = playlist[index];
      if (musicPlayer.getAttribute("src") !== nextTrack) {
        musicPlayer.src = nextTrack;
      }
    }

    function consumeModalEvent(event) {
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation?.();
      lookDrag.active = false;
      lookDrag.moved = false;
    }

    function bindInstantButton(button, action) {
      ["pointerdown", "pointerup", "mousedown", "mouseup", "touchstart", "touchend", "click"].forEach(eventName => {
        button.addEventListener(eventName, action);
      });
    }

    function enterGallery(event) {
      consumeModalEvent(event);
      if (welcomeModal.classList.contains("is-hidden")) return;
      welcomeModal.classList.add("is-hidden");
      startBackgroundMusic();
    }

    function openGuide(event) {
      consumeModalEvent(event);
      guideModal.classList.remove("is-hidden");
    }

    function closeGuide(event) {
      consumeModalEvent(event);
      if (guideModal.classList.contains("is-hidden")) return;
      guideModal.classList.add("is-hidden");
    }

    bindInstantButton(welcomeClose, enterGallery);
    bindInstantButton(guideView, openGuide);
    bindInstantButton(guideClose, closeGuide);

    const artworks = [
      {
        title: "Mona Lisa",
        artist: "Leonardo da Vinci, c. 1503-1519",
        url: "assets/art/mona-lisa.jpg",
        side: "left",
        z: -8,
        width: 2.25,
        height: 3.2
      },
      {
        title: "The Starry Night",
        artist: "Vincent van Gogh, 1889",
        url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1200px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg",
        side: "right",
        z: -12,
        width: 3.3,
        height: 2.55
      },
      {
        title: "Girl with a Pearl Earring",
        artist: "Johannes Vermeer, c. 1665",
        url: "assets/art/pearl-earring.jpg",
        side: "left",
        z: -16.2,
        width: 2.45,
        height: 3
      },
      {
        title: "The Great Wave off Kanagawa",
        artist: "Katsushika Hokusai, c. 1831",
        url: "assets/art/great-wave.jpg",
        side: "right",
        z: -20.3,
        width: 3.5,
        height: 2.35
      },
      {
        title: "The Birth of Venus",
        artist: "Sandro Botticelli, c. 1485",
        url: "assets/art/birth-venus.jpg",
        side: "left",
        z: -24.8,
        width: 3.5,
        height: 2.32
      },
      {
        title: "Las Meninas",
        artist: "Diego Velazquez, 1656",
        url: "assets/art/las-meninas.jpg",
        side: "right",
        z: -29.2,
        width: 2.75,
        height: 3.28
      },
      {
        title: "The Creation of Adam",
        artist: "Michelangelo, c. 1512",
        url: "assets/art/creation-adam.jpg",
        side: "left",
        z: -33.7,
        width: 3.5,
        height: 1.65
      },
      {
        title: "Arnolfini Portrait",
        artist: "Jan van Eyck, 1434",
        url: "assets/art/arnolfini.jpg",
        side: "right",
        z: -38,
        width: 2.45,
        height: 3.15
      },
      {
        title: "A Sunday on La Grande Jatte",
        artist: "Georges Seurat, 1884-1886",
        url: "assets/art/grande-jatte.jpg",
        side: "left",
        z: -42.7,
        width: 3.55,
        height: 2.35
      },
      {
        title: "The Kiss",
        artist: "Gustav Klimt, 1907-1908",
        url: "assets/art/the-kiss.jpg",
        side: "end",
        z: -48.5,
        width: 2.75,
        height: 2.75
      }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#eaf5ff");
    scene.fog = new THREE.Fog("#eef7ff", 30, 74);

    const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 120);
    camera.position.set(0, 1.75, 2.8);

    const isTouchDevice = window.matchMedia("(pointer: coarse)").matches || window.innerWidth <= 760;
    const maxPixelRatio = isTouchDevice ? 1 : 1.35;
    const targetFrameMs = 1000 / (isTouchDevice ? 30 : 45);

    const renderer = new THREE.WebGLRenderer({ antialias: !isTouchDevice, alpha: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, maxPixelRatio));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = false;
    mount.appendChild(renderer.domElement);

    const world = new THREE.Group();
    scene.add(world);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const interactive = [];
    const cursorState = {
      x: -120,
      y: -120,
      targetX: -120,
      targetY: -120,
      visible: false,
      hideTimer: 0
    };
    const homePosition = {
      x: 0,
      y: 1.75,
      z: 2.8,
      yaw: 0,
      pitch: 0,
      fov: 58
    };
    const target = { ...homePosition };
    const current = { ...target };
    const lookDrag = {
      active: false,
      moved: false,
      startX: 0,
      startY: 0,
      yaw: 0,
      pitch: 0
    };
    const touchGesture = {
      active: false,
      startDistance: 0,
      startCenterX: 0,
      startCenterY: 0,
      yaw: 0,
      pitch: 0,
      fov: homePosition.fov
    };
    const safariGesture = {
      active: false,
      fov: homePosition.fov
    };
    let hoveredArt = null;
    let viewingArt = null;

    function makeTexture(draw) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 384;
      const ctx = canvas.getContext("2d");
      draw(ctx, canvas);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = isTouchDevice ? 2 : 8;
      return texture;
    }

    const floorTexture = makeTexture((ctx, canvas) => {
      ctx.fillStyle = "#d9c7a7";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < 34; i += 1) {
        const y = i * 26 + Math.sin(i) * 3;
        const shade = i % 2 ? "rgba(255,255,255,.2)" : "rgba(125,83,38,.08)";
        ctx.fillStyle = shade;
        ctx.fillRect(0, y, canvas.width, 12);
        ctx.fillStyle = "rgba(128, 86, 43, .18)";
        ctx.fillRect(0, y + 24, canvas.width, 1);
      }
      for (let i = 0; i < 760; i += 1) {
        ctx.fillStyle = `rgba(110, 78, 41, ${Math.random() * .04})`;
        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 2, 2);
      }
    });
    floorTexture.wrapS = floorTexture.wrapT = THREE.RepeatWrapping;
    floorTexture.repeat.set(2.5, 18);

    const wallTexture = makeTexture((ctx, canvas) => {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, "#ffffff");
      gradient.addColorStop(.65, "#f7f7f3");
      gradient.addColorStop(1, "#eeeeea");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < 900; i += 1) {
        ctx.fillStyle = `rgba(80, 80, 70, ${Math.random() * .018})`;
        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1.4, 1.4);
      }
    });
    wallTexture.wrapS = wallTexture.wrapT = THREE.RepeatWrapping;
    wallTexture.repeat.set(5, 1.4);

    const floorMaterial = new THREE.MeshStandardMaterial({
      map: floorTexture,
      roughness: .82,
      metalness: .02,
      color: "#ead6b4"
    });
    const wallMaterial = new THREE.MeshStandardMaterial({
      map: wallTexture,
      roughness: .94,
      color: "#ffffff"
    });
    const trimMaterial = new THREE.MeshStandardMaterial({
      color: "#f4f4ee",
      metalness: .04,
      roughness: .72
    });
    const frameMaterial = new THREE.MeshStandardMaterial({
      color: "#d4c2a0",
      metalness: .16,
      roughness: .42
    });
    const labelMaterial = new THREE.MeshStandardMaterial({
      color: "#fbf6ec",
      roughness: .72
    });

    function getTouchMetrics(touches) {
      const first = touches[0];
      const second = touches[1];
      const dx = second.clientX - first.clientX;
      const dy = second.clientY - first.clientY;
      return {
        distance: Math.hypot(dx, dy),
        centerX: (first.clientX + second.clientX) / 2,
        centerY: (first.clientY + second.clientY) / 2
      };
    }

    function fallbackArtworkTexture(art) {
      return makeTexture((ctx, canvas) => {
        const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        g.addColorStop(0, "#efe3ce");
        g.addColorStop(.52, "#a58d68");
        g.addColorStop(1, "#465844");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,.3)";
        ctx.fillRect(42, 42, canvas.width - 84, canvas.height - 84);
        ctx.fillStyle = "rgba(30,25,20,.7)";
        ctx.font = "52px Georgia, serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const words = art.title.split(" ");
        const lines = words.reduce((acc, word) => {
          const last = acc[acc.length - 1] || "";
          if ((last + " " + word).trim().length > 16) acc.push(word);
          else acc[acc.length - 1] = `${last} ${word}`.trim();
          return acc;
        }, [""]);
        lines.forEach((line, index) => {
          ctx.fillText(line, canvas.width / 2, canvas.height / 2 - 38 + index * 60);
        });
        ctx.font = "28px Georgia, serif";
        ctx.fillText(art.artist, canvas.width / 2, canvas.height / 2 + 116);
      });
    }

    function makeLabelTexture(art) {

        ctx.fillStyle = "#2f2922";
        ctx.font = "46px Georgia, serif";

    }

          const bow = new THREE.Mesh(new THREE.ConeGeometry(.07, .12, 3), accentMaterial);
          bow.position.set(x, 1.25, .28);
          bow.rotation.z = x < 0 ? Math.PI / 2 : -Math.PI / 2;
          bow.castShadow = true;
          group.add(bow);
        });
      }

      if (person.trim) {
        [-.18, 0, .18].forEach(x => {
          const trim = new THREE.Mesh(new THREE.BoxGeometry(.035, .62, .035), accentMaterial);
          trim.position.set(x, .92, .28);
          trim.castShadow = true;
          group.add(trim);
        });
      }

      const side = person.x >= 0 ? 1 : -1;
      addPersonHitbox(
        group,
        { x: .75, y: 1.9, z: .75 },
        { x: 0, y: .95, z: 0 },
        {
          title: "관람객",
          artist: "작품을 바라보는 인물 옆에 섰습니다.",
          view: {
            x: person.x - side * .85,
            y: 1.72,
            z: person.z + .55,
            yaw: side * .62,
            pitch: 0
          }
        }
      );

      world.add(group);
    }

    [
      { x: 2.25, z: -11.4, look: "right", coat: "#b6402d", hair: "#e8e0cf", accent: "#d6b75a", wig: "powdered", trim: true, metalness: .22 },
      { x: -2.25, z: -15.5, look: "left", coat: "#252826", hair: "#5d5b55", accent: "#b82924", wig: "wild", scarf: true },
      { x: 2.18, z: -20.7, look: "right", coat: "#1f211e", hair: "#e5dcc8", accent: "#c8c2ad", wig: "baroque", trim: true, metalness: .18 },
      { x: -2.35, z: -25.2, look: "left", coat: "#23516a", hair: "#eee7dc", accent: "#c59b41", wig: "baroque", trim: true, metalness: .25 },
      { x: 1.92, z: -38.4, look: "right", coat: "#181818", hair: "#d6d1c7", accent: "#0f0f0f", wig: "liszt", bowTie: true }
    ].forEach(addNpc);

    function updateCaption(art) {
      if (!art) return;
      titleEl.textContent = art.title;
      metaEl.textContent = art.artist;
    }

    function isUiEvent(event) {
      return !!event.target.closest?.(".toolbar, .welcome-modal, .caption, .progress, .home-control");
    }

    function moveCharacterCursor(event) {
      if (!characterCursor) return;
      const isTouch = event.pointerType === "touch";
      window.clearTimeout(cursorState.hideTimer);
      cursorState.targetX = event.clientX + (isTouch ? -24 : 8);
      cursorState.targetY = event.clientY + (isTouch ? -58 : 10);
      if (!cursorState.visible) {
        cursorState.x = cursorState.targetX;
        cursorState.y = cursorState.targetY;
        cursorState.visible = true;
        characterCursor.classList.add("is-visible");
      }
    }

    function hideCharacterCursorSoon(delay = 520) {
      if (!characterCursor) return;
      window.clearTimeout(cursorState.hideTimer);
      cursorState.hideTimer = window.setTimeout(() => {
        cursorState.visible = false;
        characterCursor.classList.remove("is-visible", "is-hovering", "is-active");
      }, delay);
    }

    function setPointerCoordinates(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function updateLookDrag(event) {
      if (!lookDrag.active || isUiEvent(event)) return;
      const dx = event.clientX - lookDrag.startX;
      const dy = event.clientY - lookDrag.startY;
      if (Math.abs(dx) + Math.abs(dy) > 6) lookDrag.moved = true;
      target.yaw = THREE.MathUtils.clamp(lookDrag.yaw - dx * .0022, -1.38, 1.38);
      target.pitch = THREE.MathUtils.clamp(lookDrag.pitch - dy * .0032, -.42, .42);
      viewingArt = null;
    }

    function inspectArtwork(mesh) {
      const art = mesh.userData.art;
      viewingArt = mesh;
      updateCaption(art);
      if (art.side === "end") {
        target.x = 0;
        target.z = art.z + 4.7;
        target.yaw = 0;
      } else {
        target.x = art.side === "left" ? -2.75 : 2.75;
        target.z = art.z + .2;
        target.yaw = art.side === "left" ? 1.18 : -1.18;
      }
      target.pitch = 0;
      target.y = 1.85;
      updateProgress();
      mount.style.cursor = "default";
    }

    function inspectPerson(mesh) {
      const person = mesh.userData.person;
      viewingArt = mesh;
      updateCaption(person);
      Object.assign(target, person.view);
      updateProgress();
      mount.style.cursor = "default";
    }

    function viewFromPoint(point, subject) {
      const z = THREE.MathUtils.clamp(point.z, -46.5, 3.2);
      const x = THREE.MathUtils.clamp(point.x, -1.7, 1.7);
      if (subject.surface === "leftWall") {
        return { x: -2.75, y: 1.82, z, yaw: 1.18, pitch: point.y > 5 ? .22 : 0 };
      }
      if (subject.surface === "rightWall") {
        return { x: 2.75, y: 1.82, z, yaw: -1.18, pitch: point.y > 5 ? .22 : 0 };
      }
      if (subject.surface === "endWall") {
        return { x, y: 1.82, z: -46.2, yaw: 0, pitch: 0 };
      }
      if (subject.surface === "ceiling") {
        return { x, y: 1.76, z: THREE.MathUtils.clamp(point.z + 1.3, -46.5, 3.2), yaw: 0, pitch: .34 };
      }
      if (subject.surface === "floor") {
        return { x, y: 1.7, z: THREE.MathUtils.clamp(point.z + 1.1, -46.5, 3.2), yaw: 0, pitch: .12 };
      }
      const side = point.x >= 0 ? 1 : -1;
      return {
        x: THREE.MathUtils.clamp(point.x - side * .8, -1.7, 1.7),
        y: 1.72,
        z: THREE.MathUtils.clamp(point.z + .95, -46.5, 3.2),
        yaw: -side * .36,
        pitch: 0
      };
    }

    function inspectSubject(mesh, point) {
      const subject = mesh.userData.subject;
      if (!subject) return;
      viewingArt = mesh;
      updateCaption(subject);
      Object.assign(target, subject.view || viewFromPoint(point, subject));
      updateProgress();
      mount.style.cursor = "default";
    }

    window.addEventListener("pointermove", event => {
      moveCharacterCursor(event);
      if (isUiEvent(event)) return;
      updateLookDrag(event);
      if (event.pointerType === "touch" || viewingArt || lookDrag.active) return;
      setPointerCoordinates(event);
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObjects(interactive, false)[0]?.object;
      mount.style.cursor = hit ? "zoom-in" : "crosshair";
      characterCursor?.classList.toggle("is-hovering", !!hit);
      if (hit?.userData.kind === "person") {
        if (hit !== hoveredArt) {
          hoveredArt = hit;
          updateCaption(hit.userData.person);
        }
        return;
      }
      if (hit && hit !== hoveredArt && hit.userData.art) {
        hoveredArt = hit;
        updateCaption(hit.userData.art);
        return;
      }
      if (hit && hit !== hoveredArt && hit.userData.subject) {
        hoveredArt = hit;
        updateCaption(hit.userData.subject);
      }
    });

    window.addEventListener("pointerup", event => {
      characterCursor?.classList.remove("is-active");
      if (event.pointerType === "touch") {
        moveCharacterCursor(event);
        hideCharacterCursorSoon();
      }
      if (isUiEvent(event)) {
        lookDrag.active = false;
        lookDrag.moved = false;
        return;
      }
      setPointerCoordinates(event);
      const wasDragging = lookDrag.active && lookDrag.moved;
      lookDrag.active = false;
      lookDrag.moved = false;
      if (wasDragging) return;
      if (viewingArt) {
        viewingArt = null;
        return;
      }
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObjects(interactive, false)[0];
      const mesh = hit?.object;
      if (mesh?.userData.kind === "person") inspectPerson(mesh);
      else if (mesh?.userData.kind === "art") inspectArtwork(mesh);
      else if (mesh?.userData.kind === "subject") inspectSubject(mesh, hit.point);
    });

    window.addEventListener("pointerdown", event => {
      if (!isUiEvent(event)) {
        moveCharacterCursor(event);
        characterCursor?.classList.add("is-active");
        lookDrag.active = true;
        lookDrag.moved = false;
        lookDrag.startX = event.clientX;
        lookDrag.startY = event.clientY;
        lookDrag.yaw = target.yaw;
        lookDrag.pitch = target.pitch;
      }
    });

    window.addEventListener("pointerleave", () => {
      lookDrag.active = false;
      lookDrag.moved = false;
      cursorState.visible = false;
      characterCursor?.classList.remove("is-visible", "is-hovering", "is-active");
    });

    window.addEventListener("pointercancel", () => {
      lookDrag.active = false;
      lookDrag.moved = false;
      hideCharacterCursorSoon(180);
    });

    window.addEventListener("touchstart", event => {
      if (isUiEvent(event) || event.touches.length !== 2) return;
      event.preventDefault();
      const metrics = getTouchMetrics(event.touches);
      touchGesture.active = true;
      touchGesture.startDistance = metrics.distance;
      touchGesture.startCenterX = metrics.centerX;
      touchGesture.startCenterY = metrics.centerY;
      touchGesture.yaw = target.yaw;
      touchGesture.pitch = target.pitch;
      touchGesture.fov = target.fov;
      lookDrag.active = false;
      lookDrag.moved = true;
      viewingArt = null;
    }, { passive: false });

    window.addEventListener("touchmove", event => {
      if (!touchGesture.active || event.touches.length !== 2 || isUiEvent(event)) return;
      event.preventDefault();
      const metrics = getTouchMetrics(event.touches);
      const centerDx = metrics.centerX - touchGesture.startCenterX;
      const centerDy = metrics.centerY - touchGesture.startCenterY;
      const distanceRatio = touchGesture.startDistance / Math.max(metrics.distance, 1);
      const zoomRatio = Math.pow(distanceRatio, 2.45);
      target.yaw = THREE.MathUtils.clamp(touchGesture.yaw - centerDx * .0022, -1.38, 1.38);
      target.pitch = THREE.MathUtils.clamp(touchGesture.pitch - centerDy * .003, -.42, .42);
      setZoomFov(touchGesture.fov * zoomRatio);
    }, { passive: false });

    window.addEventListener("touchend", event => {
      if (event.touches.length < 2) {
        touchGesture.active = false;
      }
    });

    window.addEventListener("gesturestart", event => {
      event.preventDefault();
      safariGesture.active = true;
      safariGesture.fov = target.fov;
      viewingArt = null;
    }, { passive: false });

    window.addEventListener("gesturechange", event => {
      if (!safariGesture.active) return;
      event.preventDefault();
      const scale = Math.max(event.scale, .1);
      const zoomRatio = 1 / Math.pow(scale, 3.2);
      setZoomFov(safariGesture.fov * zoomRatio);
    }, { passive: false });

    window.addEventListener("gestureend", () => {
      safariGesture.active = false;
    });

    window.addEventListener("wheel", event => {
      event.preventDefault();
      viewingArt = null;
      if (Math.abs(event.deltaX) > Math.abs(event.deltaY) * 1.15) {
        target.yaw = THREE.MathUtils.clamp(target.yaw - event.deltaX * .002, -1.38, 1.38);
        return;
      }
      zoomByWheel(event.deltaY);
    }, { passive: false });

    toolbar.addEventListener("click", event => {
      event.stopPropagation();
    });

    document.querySelectorAll("[data-music]").forEach(button => {
      button.addEventListener("click", () => {
        if (button.dataset.music === "play") {
          shouldAutoPlay = true;
          loadTrack(trackIndex);
          musicPlayer.play().catch(() => {});
        }
        if (button.dataset.music === "pause") {
          shouldAutoPlay = false;
          musicPlayer.pause();
        }
        if (button.dataset.music === "stop") {
          shouldAutoPlay = false;
          musicPlayer.pause();
          musicPlayer.currentTime = 0;
        }
      });
    });

    function startBackgroundMusic() {
      if (!shouldAutoPlay || !musicPlayer.paused) return;
      loadTrack(trackIndex);
      musicPlayer.play().catch(() => {});
    }

    ["pointerdown", "wheel", "keydown", "touchstart"].forEach(eventName => {
      window.addEventListener(eventName, startBackgroundMusic, { once: true, passive: true });
    });

    musicPlayer.addEventListener("ended", () => {
      trackIndex = (trackIndex + 1) % playlist.length;
      loadTrack(trackIndex);
      if (shouldAutoPlay) musicPlayer.play().catch(() => {});
    });

    resetView.addEventListener("click", returnHome);
    homeView.addEventListener("click", returnHome);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, maxPixelRatio));
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let lastRenderTime = 0;
    function animate(time = 0) {
      requestAnimationFrame(animate);
      if (time - lastRenderTime < targetFrameMs) return;
      lastRenderTime = time;
      current.x = THREE.MathUtils.lerp(current.x, target.x, .055);
      current.y = THREE.MathUtils.lerp(current.y, target.y, .055);
      current.z = THREE.MathUtils.lerp(current.z, target.z, .055);
      current.yaw = THREE.MathUtils.lerp(current.yaw, target.yaw, .045);
      current.pitch = THREE.MathUtils.lerp(current.pitch, target.pitch, .06);
      current.fov = THREE.MathUtils.lerp(current.fov, target.fov, .18);

      cursorState.x = THREE.MathUtils.lerp(cursorState.x, cursorState.targetX, .38);
      cursorState.y = THREE.MathUtils.lerp(cursorState.y, cursorState.targetY, .38);
      if (characterCursor && cursorState.visible) {
        characterCursor.style.transform = `translate3d(${cursorState.x}px, ${cursorState.y}px, 0)`;
      }

      camera.position.set(current.x, current.y, current.z);
      camera.rotation.order = "YXZ";
      camera.rotation.y = current.yaw;
      camera.rotation.x = current.pitch;
      if (Math.abs(camera.fov - current.fov) > .02) {
        camera.fov = current.fov;
        camera.updateProjectionMatrix();
      }

      renderer.render(scene, camera);
    }

    animate();
    window.setTimeout(() => loading.classList.add("is-hidden"), 650);
  })();
  </script>
</body>
</html>
