<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>빛의 갤러리</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #29241f;
      --muted: #6f665d;
      --panel: rgba(255, 250, 241, .82);
      --line: rgba(71, 57, 43, .18);
      --accent: #52624f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #efe5d7;
      color: var(--ink);
    }

    #gallery {
      position: fixed;
      inset: 0;
      cursor: crosshair;
      background:
        radial-gradient(circle at 50% 8%, rgba(255, 255, 255, .68), transparent 38%),
        linear-gradient(180deg, #f8f0e5 0%, #eadcc9 100%);
    }

    .topbar,
    .caption,
    .progress {
      position: fixed;
      z-index: 4;
      pointer-events: none;
    }

    .topbar {
      top: clamp(16px, 3vw, 28px);
      left: clamp(16px, 3vw, 32px);
      right: clamp(16px, 3vw, 32px);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      max-width: min(620px, 66vw);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 5.2vw, 5.4rem);
      font-weight: 500;
      line-height: .9;
      letter-spacing: 0;
      color: rgba(36, 31, 27, .92);
      text-wrap: balance;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 241, .7);
      color: var(--ink);
      font-size: 1.2rem;
      line-height: 1;
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 28px rgba(62, 47, 33, .08);
      cursor: pointer;
    }

    button:hover {
      background: rgba(255, 255, 255, .92);
    }

    .caption {
      left: clamp(16px, 4vw, 48px);
      bottom: clamp(18px, 4vw, 42px);
      width: min(420px, calc(100vw - 32px));
      min-height: 98px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 22px 60px rgba(76, 59, 40, .16);
      backdrop-filter: blur(20px);
    }

    .caption b,
    .caption span {
      display: block;
    }

    .caption b {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.15rem, 2.2vw, 1.7rem);
      font-weight: 500;
      line-height: 1.06;
    }

    .caption span {
      margin-top: 8px;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.45;
    }

    .progress {
      right: clamp(16px, 3vw, 32px);
      bottom: clamp(18px, 4vw, 42px);
      width: min(220px, 34vw);
      height: 5px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(72, 58, 42, .16);
    }

    .progress i {
      display: block;
      width: 18%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transform-origin: left center;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      box-shadow: inset 0 0 120px rgba(67, 49, 30, .12);
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #efe5d7;
      color: var(--muted);
      transition: opacity .5s ease, visibility .5s ease;
    }

    .loading.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: center;
      }

      h1 {
        max-width: calc(100vw - 96px);
        font-size: clamp(2rem, 11vw, 3.6rem);
      }

      .caption {
        min-height: 86px;
      }

      .progress {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main id="gallery" aria-label="3D 명화 갤러리"></main>
  <div class="topbar">
    <h1>빛의 갤러리</h1>
    <div class="toolbar">
      <button id="resetView" type="button" aria-label="처음 위치로">↺</button>
    </div>
  </div>
  <aside class="caption" aria-live="polite">
    <b id="artTitle">전시장 입구</b>
    <span id="artMeta">밝은 베이지 톤의 가상 전시장에 명작 10점을 걸어두었습니다.</span>
  </aside>
  <div class="progress" aria-hidden="true"><i id="progressBar"></i></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="loading" id="loading">갤러리 조명 조정 중</div>

  <script src="./assets/vendor/three.global.js"></script>
  <script>
  (() => {
    const mount = document.querySelector("#gallery");
    const loading = document.querySelector("#loading");
    const titleEl = document.querySelector("#artTitle");
    const metaEl = document.querySelector("#artMeta");
    const progressBar = document.querySelector("#progressBar");
    const resetView = document.querySelector("#resetView");

    const artworks = [
      {
        title: "Mona Lisa",
        artist: "Leonardo da Vinci, c. 1503-1519",
        url: "assets/art/mona-lisa.jpg",
        side: "left",
        z: -8,
        width: 2.25,
        height: 3.2
      },
      {
        title: "The Starry Night",
        artist: "Vincent van Gogh, 1889",
        url: "assets/art/starry-night.jpg",
        side: "right",
        z: -12,
        width: 3.3,
        height: 2.55
      },
      {
        title: "Girl with a Pearl Earring",
        artist: "Johannes Vermeer, c. 1665",
        url: "assets/art/pearl-earring.jpg",
        side: "left",
        z: -16.2,
        width: 2.45,
        height: 3
      },
      {
        title: "The Great Wave off Kanagawa",
        artist: "Katsushika Hokusai, c. 1831",
        url: "assets/art/great-wave.jpg",
        side: "right",
        z: -20.3,
        width: 3.5,
        height: 2.35
      },
      {
        title: "The Birth of Venus",
        artist: "Sandro Botticelli, c. 1485",
        url: "assets/art/birth-venus.jpg",
        side: "left",
        z: -24.8,
        width: 3.5,
        height: 2.32
      },
      {
        title: "Las Meninas",
        artist: "Diego Velazquez, 1656",
        url: "assets/art/las-meninas.jpg",
        side: "right",
        z: -29.2,
        width: 2.75,
        height: 3.28
      },
      {
        title: "The Creation of Adam",
        artist: "Michelangelo, c. 1512",
        url: "assets/art/creation-adam.jpg",
        side: "left",
        z: -33.7,
        width: 3.5,
        height: 1.65
      },
      {
        title: "Arnolfini Portrait",
        artist: "Jan van Eyck, 1434",
        url: "assets/art/arnolfini.jpg",
        side: "right",
        z: -38,
        width: 2.45,
        height: 3.15
      },
      {
        title: "A Sunday on La Grande Jatte",
        artist: "Georges Seurat, 1884-1886",
        url: "assets/art/grande-jatte.jpg",
        side: "left",
        z: -42.7,
        width: 3.55,
        height: 2.35
      },
      {
        title: "The Kiss",
        artist: "Gustav Klimt, 1907-1908",
        url: "assets/art/the-kiss.jpg",
        side: "end",
        z: -48.5,
        width: 2.75,
        height: 2.75
      }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#efe5d7");
    scene.fog = new THREE.Fog("#efe5d7", 24, 66);

    const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 120);
    camera.position.set(0, 1.75, 2.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    mount.appendChild(renderer.domElement);

    const world = new THREE.Group();
    scene.add(world);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const interactive = [];
    const target = {
      x: 0,
      y: 1.75,
      z: 2.8,
      yaw: 0,
      pitch: 0
    };
    const current = { ...target };
    let hoveredArt = null;

    function makeTexture(draw) {
      const canvas = document.createElement("canvas");
      canvas.width = 1024;
      canvas.height = 768;
      const ctx = canvas.getContext("2d");
      draw(ctx, canvas);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = 8;
      return texture;
    }

    const floorTexture = makeTexture((ctx, canvas) => {
      ctx.fillStyle = "#dcc9b2";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < 26; i += 1) {
        const y = i * 34 + Math.sin(i) * 4;
        const shade = i % 2 ? "rgba(255,255,255,.17)" : "rgba(88,58,34,.07)";
        ctx.fillStyle = shade;
        ctx.fillRect(0, y, canvas.width, 18);
      }
      for (let i = 0; i < 900; i += 1) {
        ctx.fillStyle = `rgba(74, 54, 32, ${Math.random() * .055})`;
        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 2, 2);
      }
    });
    floorTexture.wrapS = floorTexture.wrapT = THREE.RepeatWrapping;
    floorTexture.repeat.set(2.5, 18);

    const wallTexture = makeTexture((ctx, canvas) => {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, "#fff8ed");
      gradient.addColorStop(1, "#eadac3");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < 1300; i += 1) {
        ctx.fillStyle = `rgba(88, 66, 42, ${Math.random() * .035})`;
        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1.4, 1.4);
      }
    });
    wallTexture.wrapS = wallTexture.wrapT = THREE.RepeatWrapping;
    wallTexture.repeat.set(5, 1.4);

    const floorMaterial = new THREE.MeshStandardMaterial({
      map: floorTexture,
      roughness: .82,
      metalness: .02,
      color: "#f1e0cb"
    });
    const wallMaterial = new THREE.MeshStandardMaterial({
      map: wallTexture,
      roughness: .9,
      color: "#fff3e1"
    });
    const trimMaterial = new THREE.MeshStandardMaterial({
      color: "#a98b5f",
      metalness: .28,
      roughness: .36
    });
    const frameMaterial = new THREE.MeshStandardMaterial({
      color: "#8d7048",
      metalness: .3,
      roughness: .34
    });
    const labelMaterial = new THREE.MeshStandardMaterial({
      color: "#fbf6ec",
      roughness: .72
    });

    function addBox(width, height, depth, x, y, z, material) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), material);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      world.add(mesh);
      return mesh;
    }

    addBox(10, .16, 56, 0, 0, -23, floorMaterial);
    addBox(10, .16, 56, 0, 4.25, -23, wallMaterial);
    addBox(.2, 4.25, 56, -5, 2.05, -23, wallMaterial);
    addBox(.2, 4.25, 56, 5, 2.05, -23, wallMaterial);
    addBox(10, 4.25, .2, 0, 2.05, -50.8, wallMaterial);
    addBox(.16, .16, 56, -4.88, .16, -23, trimMaterial);
    addBox(.16, .16, 56, 4.88, .16, -23, trimMaterial);
    addBox(.16, .16, 56, -4.88, 4.08, -23, trimMaterial);
    addBox(.16, .16, 56, 4.88, 4.08, -23, trimMaterial);

    scene.add(new THREE.HemisphereLight("#ffffff", "#c7ab8f", 1.55));

    const sun = new THREE.DirectionalLight("#fff4da", 2.2);
    sun.position.set(-3, 7, 4);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 70;
    sun.shadow.camera.left = -12;
    sun.shadow.camera.right = 12;
    sun.shadow.camera.top = 12;
    sun.shadow.camera.bottom = -12;
    scene.add(sun);

    for (let z = -4; z > -49; z -= 6) {
      const glow = new THREE.PointLight("#fff2d4", .92, 12, 2.1);
      glow.position.set(0, 3.75, z);
      world.add(glow);
      addBox(1.7, .05, .16, 0, 4.02, z, trimMaterial);
    }

    function fallbackArtworkTexture(art) {
      return makeTexture((ctx, canvas) => {
        const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        g.addColorStop(0, "#efe3ce");
        g.addColorStop(.52, "#a58d68");
        g.addColorStop(1, "#465844");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,.3)";
        ctx.fillRect(42, 42, canvas.width - 84, canvas.height - 84);
        ctx.fillStyle = "rgba(30,25,20,.7)";
        ctx.font = "52px Georgia, serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const words = art.title.split(" ");
        const lines = words.reduce((acc, word) => {
          const last = acc[acc.length - 1] || "";
          if ((last + " " + word).trim().length > 16) acc.push(word);
          else acc[acc.length - 1] = `${last} ${word}`.trim();
          return acc;
        }, [""]);
        lines.forEach((line, index) => {
          ctx.fillText(line, canvas.width / 2, canvas.height / 2 - 38 + index * 60);
        });
        ctx.font = "28px Georgia, serif";
        ctx.fillText(art.artist, canvas.width / 2, canvas.height / 2 + 116);
      });
    }

    function makeLabelTexture(art) {
      return makeTexture((ctx, canvas) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fbf6ec";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#2f2922";
        ctx.font = "46px Georgia, serif";
        ctx.textBaseline = "top";
        ctx.fillText(art.title, 46, 54, canvas.width - 92);
        ctx.fillStyle = "#70665a";
        ctx.font = "29px system-ui, sans-serif";
        ctx.fillText(art.artist, 48, 128, canvas.width - 96);
      });
    }

    function addArtwork(art, index) {
      const group = new THREE.Group();
      const isEnd = art.side === "end";
      const wallX = art.side === "left" ? -4.86 : 4.86;
      const artX = isEnd ? 0 : wallX;
      const artY = 2.18;
      group.position.set(artX, artY, art.z);
      group.rotation.y = isEnd ? 0 : art.side === "left" ? Math.PI / 2 : -Math.PI / 2;

      const framePad = .28;
      const frameDepth = .18;
      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(art.width + framePad, art.height + framePad, frameDepth),
        frameMaterial
      );
      frame.position.z = -.08;
      frame.castShadow = true;
      frame.receiveShadow = true;
      group.add(frame);

      const mat = new THREE.MeshStandardMaterial({
        map: fallbackArtworkTexture(art),
        roughness: .58,
        metalness: .02
      });
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(art.width, art.height), mat);
      plane.position.z = .02;
      plane.castShadow = true;
      plane.userData = { art, index, group };
      group.add(plane);
      interactive.push(plane);

      const label = new THREE.Mesh(
        new THREE.PlaneGeometry(Math.min(art.width, 2.65), .46),
        new THREE.MeshStandardMaterial({ map: makeLabelTexture(art), roughness: .7 })
      );
      label.position.set(0, -art.height / 2 - .54, .045);
      group.add(label);

      const led = new THREE.SpotLight("#ffeaca", 1.8, 7, Math.PI / 6, .35, 1.5);
      led.position.set(0, art.height / 2 + .9, .9);
      led.target.position.set(0, 0, 0);
      group.add(led, led.target);

      world.add(group);

      new THREE.TextureLoader().load(
        art.url,
        texture => {
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.anisotropy = 8;
          mat.map = texture;
          mat.needsUpdate = true;
        },
        undefined,
        () => {
          mat.color.set("#ffffff");
        }
      );

      return group;
    }

    artworks.forEach(addArtwork);

    const benchMaterial = new THREE.MeshStandardMaterial({
      color: "#5c6a57",
      roughness: .68,
      metalness: .05
    });
    addBox(2.8, .22, .72, 0, .62, -15.2, benchMaterial);
    addBox(.24, .6, .24, -1.12, .28, -15.2, benchMaterial);
    addBox(.24, .6, .24, 1.12, .28, -15.2, benchMaterial);
    addBox(3.1, .22, .72, 0, .62, -35.5, benchMaterial);
    addBox(.24, .6, .24, -1.25, .28, -35.5, benchMaterial);
    addBox(.24, .6, .24, 1.25, .28, -35.5, benchMaterial);

    function updateCaption(art) {
      if (!art) return;
      titleEl.textContent = art.title;
      metaEl.textContent = art.artist;
    }

    function setPointerFromEvent(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      target.yaw = pointer.x * .58;
      target.pitch = pointer.y * .22;
      target.x = THREE.MathUtils.clamp(pointer.x * 1.15, -1.7, 1.7);
      target.y = THREE.MathUtils.clamp(1.75 + pointer.y * .42, 1.25, 2.35);
    }

    function inspectArtwork(mesh) {
      const art = mesh.userData.art;
      updateCaption(art);
      if (art.side === "end") {
        target.x = 0;
        target.z = art.z + 4.7;
        target.yaw = 0;
      } else {
        target.x = art.side === "left" ? -2.5 : 2.5;
        target.z = art.z + .2;
        target.yaw = art.side === "left" ? -1.06 : 1.06;
      }
      target.pitch = 0;
      target.y = 1.85;
    }

    window.addEventListener("pointermove", event => {
      setPointerFromEvent(event);
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObjects(interactive, false)[0]?.object;
      mount.style.cursor = hit ? "zoom-in" : "crosshair";
      if (hit && hit !== hoveredArt) {
        hoveredArt = hit;
        updateCaption(hit.userData.art);
      }
    });

    window.addEventListener("click", event => {
      setPointerFromEvent(event);
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObjects(interactive, false)[0]?.object;
      if (hit) inspectArtwork(hit);
    });

    window.addEventListener("wheel", event => {
      event.preventDefault();
      target.z = THREE.MathUtils.clamp(target.z - event.deltaY * .012, -46.5, 3.2);
      progressBar.style.transform = `scaleX(${THREE.MathUtils.mapLinear(target.z, 3.2, -46.5, .18, 1)})`;
    }, { passive: false });

    resetView.addEventListener("click", () => {
      Object.assign(target, { x: 0, y: 1.75, z: 2.8, yaw: 0, pitch: 0 });
      updateCaption({ title: "전시장 입구", artist: "명작 10점을 밝은 베이지 톤의 가상 갤러리에 걸어두었습니다." });
      progressBar.style.transform = "scaleX(.18)";
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      current.x = THREE.MathUtils.lerp(current.x, target.x, .055);
      current.y = THREE.MathUtils.lerp(current.y, target.y, .055);
      current.z = THREE.MathUtils.lerp(current.z, target.z, .055);
      current.yaw = THREE.MathUtils.lerp(current.yaw, target.yaw, .06);
      current.pitch = THREE.MathUtils.lerp(current.pitch, target.pitch, .06);

      camera.position.set(current.x, current.y, current.z);
      camera.rotation.order = "YXZ";
      camera.rotation.y = current.yaw;
      camera.rotation.x = current.pitch;

      renderer.render(scene, camera);
    }

    animate();
    window.setTimeout(() => loading.classList.add("is-hidden"), 650);
  })();
  </script>
</body>
</html>
